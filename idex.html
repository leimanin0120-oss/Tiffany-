<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的遊戲館</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 40px;
        }
        h1 { margin-bottom: 30px; }
        .games { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card {
            background: #2d2d44;
            padding: 25px 35px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .game-card:hover { background: #3d3d5c; transform: scale(1.05); }
        .icon { font-size: 2em; }
    </style>
</head>
<body>
    <h1>🎮 我的遊戲館</h1>
    <div class="games">
        <a href="game1.html" class="game-card">
            <div class="icon">🎯</div>
            <div>貪食蛇</div>
        </a>
        <a href="game2.html" class="game-card">
            <div class="icon">✊</div>
            <div>2048</div>
        </a>
        <!-- 加更多遊戲 -->
         <a href="game2.html" class="game-card">
            <div class="icon">✊</div>
            <div>數獨</div>
        </a>
    </div>
</body>
</html>
